{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 mt-4">
            <h3 class="card-title text-center mb-4">Create Account</h3>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label style="color: #A8B2C1;">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label style="color: #A8B2C1;">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label style="color: #A8B2C1;">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label style="color: #A8B2C1;">Role</label>
                    <select name="role" class="form-control" required>
                        <option value="">Select your role</option>
                        <option value="hospital">Hospital</option>
                        <option value="bloodbank">Blood Bank</option>
                        <option value="donor">Donor</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label style="color: #A8B2C1;">Phone Number</label>
                    <input type="text" name="phone" class="form-control">
                </div>
                <div class="mb-3">
                    <label style="color: #A8B2C1;">Location</label>
                    <input type="text" name="location" class="form-control" placeholder="e.g. Lagos, Nigeria">
                </div>
                <div class="mb-3">
                    <label style="color: #A8B2C1;">Blood Group (Donors only)</label>
                    <select name="blood_group" class="form-control">
                        <option value="">Select blood group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-2">Register</button>
            </form>
            <p class="text-center mt-3" style="color: #A8B2C1;">
                Already have an account? <a href="/login/" style="color: #E85D04;">Login here</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
